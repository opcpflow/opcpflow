name: Release & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm build:core
          pnpm build:packages

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi
          echo "## What's Changed" > /tmp/release-notes.md
          git log $RANGE --oneline --no-decorate --format="* %s (%h)" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "**Full Changelog**: https://github.com/opcpflow/opcpflow/commits/${{ github.ref_name }}" >> /tmp/release-notes.md
          echo "notes_path=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.notes_path }}
          fail_on_unmatched_files: false
          generate_release_notes: false

      - name: Publish to npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm -r --filter @opcpflow/* exec -- npx json -I -f package.json -e "this.version='$VERSION'" 2>/dev/null || true
          pnpm publish --filter @opcpflow/core --no-git-checks --access public
          pnpm publish --filter @opcpflow/react --no-git-checks --access public
          pnpm publish --filter @opcpflow/nodes --no-git-checks --access public
          pnpm publish --filter @opcpflow/engine --no-git-checks --access public
          pnpm publish --filter @opcpflow/tokens --no-git-checks --access public
          pnpm publish --filter @opcpflow/create-app --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish demo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/demo/dist
